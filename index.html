<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #1a001a);
  color: white;
  text-align: center;
}

.container {
  padding: 30px 20px;
}

.avatar {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 3px solid #ff0055;
  margin-bottom: 15px;
}

h1 {
  margin: 10px 0;
  font-size: 24px;
}

.subtitle {
  font-size: 14px;
  opacity: 0.7;
  margin-bottom: 25px;
}

.btn {
  display: block;
  width: 280px;
  margin: 12px auto;
  padding: 15px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-size: 16px;
  background: linear-gradient(45deg, #ff0055, #ff3366);
  box-shadow: 0 0 15px rgba(255, 0, 85, 0.5);
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.05);
}

.footer {
  margin-top: 30px;
  font-size: 12px;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">

<img src="YOUR_AVATAR_LINK" class="avatar">

<h1>🔥 YOUR NAME 🔥</h1>
<div class="subtitle">Exclusive content ↓</div>

<a href="LINK1" class="btn">🔞 Telegram</a>
<a href="LINK2" class="btn">⚡ Backup</a>
<a href="LINK3" class="btn">💎 Premium</a>

<div class="footer">18+ only</div>

</div>

</body>
</html>
