<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eazzy Club</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #1a001f, #000000);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

.container {
  padding: 30px 20px;
}

.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid #a100ff;
  box-shadow: 0 0 25px #a100ff;
  margin-bottom: 15px;
}

h1 {
  margin: 10px 0;
  font-size: 26px;
  text-shadow: 0 0 10px #a100ff;
}

.subtitle {
  font-size: 14px;
  opacity: 0.7;
  margin-bottom: 25px;
}

/* кнопки */
.btn {
  display: block;
  width: 280px;
  margin: 14px auto;
  padding: 15px;
  border-radius: 14px;
  text-decoration: none;
  color: white;
  font-size: 16px;
  background: linear-gradient(45deg, #6a00ff, #c800ff);
  box-shadow: 0 0 20px rgba(168, 0, 255, 0.6);
  transition: 0.25s;
  position: relative;
  overflow: hidden;
}

/* неоновый эффект */
.btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
  transition: 0.5s;
}

.btn:hover::before {
  left: 100%;
}

.btn:hover {
  transform: scale(1.06);
  box-shadow: 0 0 35px rgba(200, 0, 255, 0.9);
}

/* пульсация */
@keyframes pulse {
  0% { box-shadow: 0 0 10px #a100ff; }
  50% { box-shadow: 0 0 30px #ff00ff; }
  100% { box-shadow: 0 0 10px #a100ff; }
}

.pulse {
  animation: pulse 2s infinite;
}

.footer {
  margin-top: 30px;
  font-size: 12px;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">

<img src="https://i.pinimg.com/1200x/b8/7c/04/b87c0441115ebd81ef9812f19821e6c9.jpg" class="avatar">

<h1>🔥 Eazzy Club 🔥</h1>
<div class="subtitle">Exclusive access • 18+ only</div>

<a href="https://t.me/EazzyClub" class="btn pulse">🔞 Enter Channel</a>
<a href="https://t.me/EAZZYCLUBPEREXOD" class="btn">⚡ Backup Access</a>
<a href="https://t.me/packfullmagazinebot" class="btn">💎 Premium Bot</a>

<div class="footer">Private content • Limited access</div>

</div>

</body>
</html>
